<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar · Finanzas Personales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 15% 20%, rgba(15,118,110,0.10), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(245,158,11,0.10), transparent 45%),
      var(--bg);
    padding: 20px;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }
  .brand-mark {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: var(--font-display); font-weight: 800;
  }
  .brand-name { font-family: var(--font-display); font-weight: 700; font-size: 18px; }

  .login-card {
    padding: 36px 32px;
  }

  .login-card h1 { font-size: 22px; margin-bottom: 6px; }
  .login-card p.subtitle { color: var(--ink-soft); font-size: 14px; margin: 0 0 26px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--ink-soft); margin-bottom: 7px;
  }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-size: 14.5px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    background: #FBFCFC;
  }
  .input-wrap input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
    background: #fff;
  }
  .input-wrap svg {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--ink-soft); width: 17px; height: 17px;
  }
  .toggle-pass {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--ink-soft); padding: 4px;
  }

  .login-btn { width: 100%; padding: 13px; font-size: 15px; margin-top: 6px; }

  .error-box {
    background: var(--danger-soft);
    color: var(--danger);
    font-size: 13.5px;
    padding: 10px 14px;
    border-radius: 9px;
    margin-bottom: 16px;
    display: none;
  }
  .error-box.show { display: block; }

  .footer-note {
    text-align: center;
    margin-top: 22px;
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .spinner { display: inline-block; }
  .loading .btn-text { opacity: 0.8; }
</style>
</head>
<body>

  <div class="login-wrap">
    <div class="brand">
      <div class="brand-mark">$</div>
      <div class="brand-name">Finanzas Personales</div>
    </div>

    <form class="card login-card" id="loginForm" novalidate>
      <h1>Bienvenido de nuevo</h1>
      <p class="subtitle">Ingresa tus credenciales para continuar</p>

      <div class="error-box" id="errorBox"></div>

      <div class="field">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="cadc" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary login-btn" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-text">Ingresar</span>
      </button>
    </form>

    <p class="footer-note">Sistema de control de gastos e ingresos personales</p>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');
    const togglePass = document.getElementById('togglePass');
    const passwordInput = document.getElementById('password');

    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    togglePass.addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        errorBox.textContent = 'Completa usuario y contraseña.';
        errorBox.classList.add('show');
        return;
      }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.mensaje || 'No se pudo iniciar sesión');
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorBox.textContent = err.message || 'Usuario o contraseña incorrectos.';
        errorBox.classList.add('show');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
